<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Track any IP address or domain and see its location on a map with timezone and ISP details."
    />
    <title>Frontend Mentor | IP Address Tracker</title>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <style>
      :root {
        --color-gray-950: hsl(0, 0%, 17%);
        --color-gray-400: hsl(0, 0%, 58%);
      }
    </style>

    <style>
      /* Hide default Leaflet attribution styling clutter */
      .leaflet-control-attribution {
        font-size: 10px !important;
      }

      /* Custom location marker */
      .custom-marker {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Smooth map transitions */
      .leaflet-fade-anim .leaflet-tile,
      .leaflet-fade-anim .leaflet-popup {
        transition: opacity 0.25s ease-in-out;
      }

      /* Remove leaflet zoom control border */
      .leaflet-bar a {
        border-color: #e5e7eb !important;
      }
    </style>
  </head>

  <body
    class="font-['Rubik',sans-serif] m-0 p-0 min-h-screen flex flex-col overflow-hidden"
  >
    <!-- ========== HEADER SECTION ========== -->
    <header
      id="header"
      class="relative z-20 bg-cover bg-center bg-no-repeat pt-6 pb-36 md:pt-8 md:pb-36 flex flex-col items-center px-6"
      style="
        background-image: url(&quot;./images/pattern-bg-mobile.png&quot;);
        background-color: hsl(260, 68%, 55%);
      "
    >
      <h1
        id="page-title"
        class="text-white text-[26px] md:text-[32px] font-medium tracking-tight mb-6 md:mb-8"
      >
        IP Address Tracker
      </h1>

      <!-- Search Bar -->
      <form
        id="search-form"
        class="w-full max-w-[555px] flex rounded-2xl overflow-hidden shadow-lg"
        autocomplete="off"
      >
        <input
          id="search-input"
          type="text"
          placeholder="Search for any IP address or domain"
          class="flex-1 py-[14px] px-6 text-[18px] text-gray-950 bg-white outline-none placeholder:text-gray-400 cursor-pointer"
          aria-label="Search for any IP address or domain"
        />
        <button
          id="search-button"
          type="submit"
          class="w-[58px] bg-gray-950 hover:bg-gray-700 transition-colors duration-200 flex items-center justify-center cursor-pointer"
          aria-label="Search"
        >
          <img src="./images/icon-arrow.svg" alt="" aria-hidden="true" />
        </button>
      </form>
    </header>

    <!-- ========== INFO CARD ========== -->
    <section
      id="info-card"
      class="relative z-30 -mt-20 mx-auto w-[calc(100%-48px)] max-w-[1110px] bg-white rounded-2xl shadow-xl py-6 px-6 md:py-9 md:px-8"
    >
      <div
        id="info-grid"
        class="grid grid-cols-1 md:grid-cols-4 gap-4 md:gap-0 text-center md:text-left"
      >
        <!-- IP Address -->
        <div
          id="info-ip"
          class="md:border-r md:border-gray-200 md:pr-6 lg:pr-8"
        >
          <p
            class="text-[10px] md:text-[12px] font-bold tracking-[1.5px] md:tracking-[1.75px] text-gray-400 uppercase mb-1 md:mb-3"
          >
            IP Address
          </p>
          <p
            id="ip-value"
            class="text-gray-950 text-[20px] md:text-[26px] font-medium leading-tight"
          >
            —
          </p>
        </div>

        <!-- Location -->
        <div
          id="info-location"
          class="md:border-r md:border-gray-200 md:px-6 lg:px-8"
        >
          <p
            class="text-[10px] md:text-[12px] font-bold tracking-[1.5px] md:tracking-[1.75px] text-gray-400 uppercase mb-1 md:mb-3"
          >
            Location
          </p>
          <p
            id="location-value"
            class="text-gray-950 text-[20px] md:text-[26px] font-medium leading-tight"
          >
            —
          </p>
        </div>

        <!-- Timezone -->
        <div
          id="info-timezone"
          class="md:border-r md:border-gray-200 md:px-6 lg:px-8"
        >
          <p
            class="text-[10px] md:text-[12px] font-bold tracking-[1.5px] md:tracking-[1.75px] text-gray-400 uppercase mb-1 md:mb-3"
          >
            Timezone
          </p>
          <p
            id="timezone-value"
            class="text-gray-950 text-[20px] md:text-[26px] font-medium leading-tight"
          >
            —
          </p>
        </div>

        <!-- ISP -->
        <div id="info-isp" class="md:pl-6 lg:pl-8">
          <p
            class="text-[10px] md:text-[12px] font-bold tracking-[1.5px] md:tracking-[1.75px] text-gray-400 uppercase mb-1 md:mb-3"
          >
            ISP
          </p>
          <p
            id="isp-value"
            class="text-gray-950 text-[20px] md:text-[26px] font-medium leading-tight"
          >
            —
          </p>
        </div>
      </div>
    </section>

    <!-- ========== MAP SECTION ========== -->
    <div id="map" class="flex-1 z-10 -mt-20" style="min-height: 60vh"></div>

    <!-- ========== ATTRIBUTION ========== -->
    <div
      class="fixed bottom-2 left-1/2 -translate-x-1/2 z-[1000] text-[11px] text-center bg-white/80 backdrop-blur-sm px-3 py-1 rounded-full shadow-sm"
    >
      Challenge by
      <a
        href="https://www.frontendmentor.io?ref=challenge"
        target="_blank"
        class="text-[hsl(228,45%,44%)] hover:underline"
        >Frontend Mentor</a
      >. Coded by
      <a href="#" class="text-[hsl(228,45%,44%)] hover:underline"
        >Your Name Here</a
      >.
    </div>

    <script src="./app.js"></script>
  </body>
</html>
